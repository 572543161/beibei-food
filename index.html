<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fff4f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="贝贝小食铺">
    <title>贝贝的小食铺</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <main id="view" class="view" aria-live="polite"></main>
      <nav class="tabbar" aria-label="主导航">
        <button class="tab-btn active" data-tab="kitchen" aria-label="厨房">
          <span class="tab-icon">厨</span>
          <span>厨房</span>
        </button>
        <button class="tab-btn" data-tab="order" aria-label="菜单">
          <span class="tab-icon">单</span>
          <span>菜单</span>
        </button>
        <button class="tab-btn" data-tab="plan" aria-label="计划">
          <span class="tab-icon">划</span>
          <span>计划</span>
        </button>
        <button class="tab-btn" data-tab="backup" aria-label="备份">
          <span class="tab-icon">备</span>
          <span>备份</span>
        </button>
      </nav>
    </div>

    <div id="modal" class="modal-host hidden"></div>
    <div id="toast" class="toast hidden"></div>
    <script src="app.js"></script>
  </body>
</html>
